<!DOCTYPE html>
<html lang="en">`
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eid Ul Adha Gift Card</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f172a, #14532d);
      overflow: hidden;
      padding: 20px;
      
    }

    .moon {
      position: absolute;
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: #fef08a;
      top: 50px;
      right: 80px;
      box-shadow: 0 0 30px #fef08a;
    }

    .moon::after {
      content: '';
      position: absolute;
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: #0f172a;
      top: -5px;
      left: 30px;
    }

    .card {
      width: 360px;
      border-radius: 28px;
      overflow: hidden;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.15);
      box-shadow: 0 10px 35px rgba(0,0,0,0.4);
      animation: float 4s ease-in-out infinite;
      position: relative;
    }

    @keyframes float {
      0%,100% {
        transform: translateY(0px);
      }
      50% {
        transform: translateY(-10px);
      }
    }

    .hero {
      position: relative;
      height: 250px;
      overflow: hidden;
    }

    .hero img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: 0.5s;
    }

    .card:hover .hero img {
      transform: scale(1.08);
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.8), rgba(0,0,0,0.1));
    }

    .badge {
      position: absolute;
      top: 15px;
      left: 15px;
      background: #22c55e;
      color: white;
      padding: 8px 14px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 600;
    }

    .content {
      padding: 24px 14px 12px 14px;
      text-align: center;
      color: white;
    }

    .content h1 {
      font-size: 30px;
      margin-bottom: 10px;
      color: #fef08a;
    }

    .content p {
      font-size: 15px;
      line-height: 1.7;
      color: #e5e7eb;
      margin-bottom: 22px;
    }

    .btn {
      border: none;
      padding: 12px 24px;
      border-radius: 50px;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: white;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
      box-shadow: 0 5px 15px rgba(34,197,94,0.4);
    }

    .btn:hover {
      transform: scale(1.05);
    }

    .stars span {
      position: absolute;
      width: 4px;
      height: 4px;
      background: white;
      border-radius: 50%;
      animation: blink 2s infinite;
    }

    @keyframes blink {
      0%,100% {
        opacity: 0.2;
      }
      50% {
        opacity: 1;
      }
    }

    .wish {
      margin-top: 15px;
      font-size: 18px;
      color: #bbf7d0;
      opacity: 0;
      transition: 0.5s;
    }

    .show {
      opacity: 1;
    }

    @media(max-width: 420px) {
      .card {
        width: 100%;
      }

      .content h1 {
        font-size: 26px;
      }
    }
  </style>
</head>
<body>

  <div class="moon"></div>

  <div class="stars">
    <span style="top:10%; left:20%"></span>
    <span style="top:18%; left:70%"></span>
    <span style="top:30%; left:15%"></span>
    <span style="top:40%; left:85%"></span>
    <span style="top:60%; left:10%"></span>
    <span style="top:70%; left:75%"></span>
  </div>

  <div class="card">

    <div class="hero">
      <img src="https://images.unsplash.com/photo-1516467508483-a7212febe31a?q=80&w=1200&auto=format&fit=crop" alt="Eid Ul Adha Cow">
      <div class="overlay"></div>
      <div class="badge">Eid Ul Adha 2026</div>
    </div>

    <div class="content">
      <h1> 🌙 Eid Mubarak 🐄</h1>

      <p>
        May Allah accept your sacrifice and fill your life with happiness,
        peace, and endless blessings.
      </p>

      <button class="btn" onclick="showWish()">
        Click Gift ✨
      </button>

      <div class="wish" id="wishText">
        🐄 Eid Ul Adha Mubarak to You & Your Family 🌙
      </div>
    </div>
  </div>

  <script>
    function showWish() {
      const wish = document.getElementById('wishText');
      wish.classList.toggle('show');
    }
  </script>

</body>
</html>
